services:
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      - RAILS_ENV=production
      - RAILS_MASTER_KEY=${RAILS_MASTER_KEY}
      - DATABASE_URL=sqlite3:/rails/storage/production.sqlite3
    volumes:
      - storage:/rails/storage
    command: ./bin/rails server -b 0.0.0.0

volumes:
  storage:
