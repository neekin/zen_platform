<!DOCTYPE html>
<html>
<head>
  <title>页面不存在 — Zen Platform</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0f1e; color: rgba(255,255,255,0.85);
      display: flex; justify-content: center; align-items: center; min-height: 100vh;
    }
    .container { text-align: center; }
    .error-code { font-size: 120px; font-weight: 700; color: #1677ff; line-height: 1; }
    .error-message { font-size: 24px; margin: 16px 0 8px; color: rgba(255,255,255,0.65); }
    .error-desc { font-size: 14px; color: rgba(255,255,255,0.45); margin-bottom: 32px; }
    .btn {
      display: inline-block; padding: 10px 28px; background: #1677ff; color: #fff;
      text-decoration: none; border-radius: 8px; font-size: 14px;
      box-shadow: 0 0 20px rgba(22,119,255,0.3);
    }
    .btn:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-code">404</div>
    <div class="error-message">页面不存在</div>
    <div class="error-desc">您访问的页面可能已被移除或暂时不可用</div>
    <a href="/admin" class="btn">返回首页</a>
  </div>
</body>
</html>
